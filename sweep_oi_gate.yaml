# Grid D — trend-exhaustion stand-down gate (OI×liquidation research Phase 1).
# Pre-registered in docs/OI_LIQUIDATION_PHASE0_PHASE1.md. Now includes the
# funding∧OI conjunction (oi_z_mins) — completed 2026-07-12 once a Coinalyze
# OI source was wired (research/data/BTC_oi_history.json). Coverage caveat:
# Coinalyze free-tier OI reaches back only ~84 days (2026-04-19+), so the
# conjunction declines to fire on any bar predating coverage — every
# funding-suppressed entry from the original run is earlier than that.
sweep_name: grid_d_standdown_funding_and_oi
grids:
  - name: grid_d
    tf_pairs:
      - {bias: "4h", trigger: "1h"}
      - {bias: "1d", trigger: "4h"}
    indicator_sets: ["default"]
    stop_models:
      - {model: "structural"}
    target_models: ["fib_extension_preferred"]
    standdown:
      - {entry: false}
      - {entry: true, funding_pctiles: [85, 90]}
      - {entry: true, funding_pctiles: [85, 90], oi_z_mins: [1.5, 2.0]}
