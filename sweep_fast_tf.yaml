# Grid E — fast-TF pairs under CORRECTED Fisher (higher-frequency question).
# Pre-registered readout: PRIMARY = trade frequency (gate-passing trades/week)
# and whether the R:R gate admits entries at these TFs at all; profitability
# SECONDARY and heavily caveated — retention truncates windows to ~17 days
# (5m trigger) / ~52 days (15m trigger), one regime, tiny n. The only prior
# fast-TF evidence (V2.2/V2.3 15m/5m: 0-2 trades) was generated by the
# saturated pre-fix Fisher and is void as a frequency measurement.
sweep_name: grid_e_fast_tf_corrected_fisher
grids:
  - name: grid_e
    tf_pairs:
      - {bias: "15m", trigger: "5m"}
      - {bias: "1h", trigger: "15m"}
    indicator_sets: ["default"]
    stop_models:
      - {model: "structural"}
    target_models: ["nearest_structure", "fib_extension_preferred"]
