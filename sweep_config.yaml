# V2.3 backtest sweep — Grid C: target model x stop model, axis-isolated.
#
# Grids A (stop models) and B (Fisher-4H) are ANSWERED — results in
# docs/V2_2_STOP_SWEEP_FISHER4H.md, configs in git history (ec81c40 /
# c0e91c4). Per those results this grid fixes: indicators = default
# (RSI/all-5 gave no benefit), Fisher-4H = off (entry filter hurt, exit
# never fires), hybrid@2.0 dropped (behaviorally identical to @1.5).
#
# 3 TF pairs x 3 stop models x 3 target models = 27 runs.
# blue_sky_atr_multiplier 3.0 is an unswept first guess (V2.3 open
# item 1) — bracket it in a follow-up only if blue_sky_atr shows edge.
sweep_name: v2_3_target_extension
grids:
  - name: C_targets
    tf_pairs:
      - {bias: 4h, trigger: 1h}
      - {bias: 15m, trigger: 5m}
      - {bias: 1d, trigger: 4h}
    indicator_sets:
      - default                      # bias_sr + fisher + obv
    stop_models:
      - {model: structural}          # current live behavior
      - {model: hybrid, atr_multiplier: 1.0}
      - {model: hybrid, atr_multiplier: 1.5}
    target_models:                   # cumulative ladder: 2-vs-1 isolates
      - nearest_structure            #   extension effect, 3-vs-2 isolates
      - fib_extension_preferred      #   the blue-sky fallback
      - blue_sky_atr
    blue_sky_atr_multiplier: 3.0
